<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фиксированная шапка</title>
    <link rel="stylesheet" href="assets/css/style5.css">
</head>
<body>
    <header class="header">
        <h1>Фиксируемая шапка</h1>
    </header>

    <main>
        <section class="section">
            <h2>Первая секция</h2>
            <p>Прокрутите вниз — шапка будет плавно появляться и станет фиксированной.</p>
        </section>
        <section class="section">
            <h2>Вторая секция</h2>
            <p>Когда вы дошли до этой секции, шапка уже зафиксирована вверху.</p>
        </section>
        <section class="section">
            <h2>Дополнительный контент</h2>
            <p>Прокрутите обратно вверх — шапка исчезнет и вернётся в обычное положение.</p>
        </section>
    </main>
</body>
</html>
